# GitHub Actions workflow for auto-tagging and marketplace dispatch
# Triggers when install.sh is modified on main branch
# 1. Verifies plugin files match VERSION (fails if drift detected)
# 2. Creates git tag if it doesn't exist
# 3. Tag creation triggers release.yml workflow
# 4. Dispatches version update to standalone marketplace repo
#
# IMPORTANT: Plugin files (.claude-plugin/plugin.json, marketplace.json)
# must be updated in the SAME PR that bumps VERSION in install.sh.
# This workflow does NOT commit — branch protection requires PRs.

name: Version Sync & Auto-Tag

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'

permissions:
  contents: write

jobs:
  version-sync:
    name: Verify, Tag & Dispatch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}

      - name: Extract version from install.sh
        id: version
        run: |
          VERSION=$(grep '^VERSION=' install.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist"
          fi

      - name: Verify plugin files match VERSION
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ERRORS=0

          # Check plugin.json
          if [ -f ".claude-plugin/plugin.json" ]; then
            CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
            if [ "$CURRENT" != "$VERSION" ]; then
              echo "::error::plugin.json has version $CURRENT but install.sh has $VERSION"
              echo "::error::Update plugin.json in the same PR that bumps VERSION"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ plugin.json version matches: $VERSION"
            fi
          fi

          # Check marketplace.json
          if [ -f ".claude-plugin/marketplace.json" ]; then
            CURRENT=$(jq -r '(.plugins[] | select(.name == "superpowers-plus")).version' .claude-plugin/marketplace.json)
            if [ "$CURRENT" != "$VERSION" ]; then
              echo "::error::marketplace.json has version $CURRENT but install.sh has $VERSION"
              echo "::error::Update marketplace.json in the same PR that bumps VERSION"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ marketplace.json version matches: $VERSION"
            fi
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "::error::Version drift detected. Plugin files must be updated in the same PR as install.sh VERSION bump."
            exit 1
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          echo "Created and pushed tag v$VERSION"

      - name: Dispatch to standalone marketplace
        if: steps.tag_check.outputs.TAG_EXISTS == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
          repository: bordenet/superpowers-plus-marketplace
          event-type: version-update
          client-payload: '{"version": "${{ steps.version.outputs.VERSION }}", "source": "superpowers-plus"}'

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG_EXISTS="${{ steps.tag_check.outputs.TAG_EXISTS }}"

          echo "## Version Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY

          if [ "$TAG_EXISTS" == "true" ]; then
            echo "- **Status:** Tag v$VERSION already exists, no action taken" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Plugin files:** Verified in sync" >> $GITHUB_STEP_SUMMARY
            echo "- **Tag:** Created v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "- **Dispatched:** Version update to superpowers-plus-marketplace" >> $GITHUB_STEP_SUMMARY
            echo "- **Next:** release.yml workflow will create GitHub Release" >> $GITHUB_STEP_SUMMARY
          fi
