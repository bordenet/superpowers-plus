name: Tests

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [main, staging, dev]

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install MCP dependencies
        run: cd mcp && npm ci

      - name: Frontmatter parser tests
        run: node test/frontmatter.test.js

      - name: Skill router tests
        run: node test/skill-router.test.js

      - name: Skill discovery tests
        run: node test/skill-discovery.test.js

      - name: Composition engine tests
        run: node test/composition-engine.test.js

      - name: Workflow state tests
        run: node test/workflow-state.test.js

      - name: Compression unit tests
        run: node test/compress.test.js

      - name: Compression safety gate
        run: node test/compression-safety.test.js

      - name: EI-move detector
        run: node test/ei-move-detector.test.js
        env:
          # Waivers are declared in the PR body as: EI-WAIVER: <skill> -<pct>% — <reason>
          # On push events github.event.pull_request is null so EI_WAIVERS is
          # empty — waivers without a paired --update will fail post-merge push
          # CI. Always run --update when using a waiver before merging.
          EI_WAIVERS: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}

      - name: Operative-move detector
        run: node test/operative-move-detector.test.js
        env:
          # Waivers are declared in the PR body as: OP-WAIVER: <skill> <pattern> -<n> — <reason>
          OP_WAIVERS: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}

      - name: Hub-anchor validator
        run: node test/hub-anchor-validator.test.js

      - name: Skill-invocation smoke
        run: node test/skill-invocation-smoke.test.js

      - name: MCP smoke test
        run: cd mcp && npm test
        env:
          PERSONAL_SKILLS_DIR: ${{ github.workspace }}/skills
          SUPERPOWERS_SKILLS_DIR: /dev/null

      - name: Language scanner tests
        run: node test/language-scanner.test.js

      - name: CR battery evidence verifier tests
        run: node test/verify-cr-battery-evidence.test.js

  shell-tests:
    name: Shell Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.email "ci@superpowers-plus.test"
          git config --global user.name "CI Runner"

      - name: Install BATS
        run: |
          git clone --depth 1 --branch v1.11.0 \
            https://github.com/bats-core/bats-core.git /tmp/bats
          # Pin to the v1.11.0 annotated tag object SHA (not the commit SHA) to
          # prevent mutable-tag supply chain risk. If the tag is rewritten to a
          # new tag object, this SHA will no longer be present and CI will fail.
          git -C /tmp/bats checkout 41fb1bc31d1849b406fb18d4a6d8c6644b8300e7
          sudo /tmp/bats/install.sh /usr/local

      - name: Commit gate tests (BATS)
        run: bats tests/commit-gate-test.bats

      - name: Installer integration tests (BATS)
        run: bats tests/install-test.bats

      - name: Claude guardrails regression tests (BATS)
        run: bats tests/claude-guardrails-test.bats

      - name: Wiki-write regression tests (BATS, sp-bughunt #3)
        run: bats tests/wiki-write-test.bats

      - name: Augment non-regression tests (BATS)
        run: bats tests/augment-non-regression-test.bats
        env:
          PERSONAL_SKILLS_DIR: ${{ github.workspace }}/skills

      - name: CR-battery preservation tests (BATS)
        run: bats tests/cr-battery-preservation-test.bats

      - name: Install main tests (BATS)
        run: bats tests/install-main-test.bats

      - name: Session handoff check tests (BATS)
        run: bats tests/session-handoff-check-test.bats

      - name: Scope tripwire auto-detect tests (BATS)
        run: bats tests/scope-tripwire-autodetect-test.bats

      - name: Pre-push LOC gate remote-name tests (BATS)
        run: bats tests/pre-push-loc-gate-remote-test.bats

      - name: Pre-push LOC gate tests (BATS)
        run: bats test/pre-push-loc-gate.bats

      - name: Scope tripwire check tests (BATS)
        run: bats test/scope-tripwire-check.bats

      - name: Fence-scan tests (BATS)
        run: bats test/fence-scan.bats

      - name: Review-router tests (BATS)
        run: bats test/review.bats

      - name: Which-gate tests (BATS)
        run: bats test/which-gate.bats

      - name: Sentinel fast-forward tests (BATS)
        run: bats tests/try-sentinel-fast-forward-test.bats

      - name: Pre-push GIT_DIR leak tests (BATS)
        run: bats test/pre-push-git-dir-leak.bats

      - name: Suite-wide GIT_DIR isolation tests (BATS)
        run: |
          bats test/suite-git-dir-isolation.bats
          bats tests/suite-git-dir-isolation-test.bats

      - name: Doctor checks tests
        run: bash tools/tests/test_doctor_checks.sh
        env:
          PERSONAL_SKILLS_DIR: ${{ github.workspace }}/skills

      - name: MCP checks tests (BATS)
        run: bats tests/mcp-checks-test.bats

      - name: TODO lock tests
        run: bash tools/tests/test_todo_lock.sh

      - name: TODO engine unit tests
        run: python3 tools/tests/test_todo_engine.py -v

      - name: TODO archive tests
        run: bash skills/productivity/todo-archive/tests/test_todo_archive.sh

      - name: SKILLS.md count lint
        run: |
          ACTUAL=$(find skills/ -name "skill.md" -not -path "*/_adapters/*" | wc -l | tr -d ' ')
          DECLARED=$(grep -o 'SKILL-COUNT: [0-9]*' docs/SKILLS.md | grep -o '[0-9]*')
          if [ -z "$DECLARED" ]; then
            echo "FAIL: <!-- SKILL-COUNT: N --> comment not found in docs/SKILLS.md"
            exit 1
          fi
          if [ "$ACTUAL" != "$DECLARED" ]; then
            echo "FAIL: docs/SKILLS.md declares $DECLARED skills but found $ACTUAL"
            echo "Update the <!-- SKILL-COUNT: --> comment in docs/SKILLS.md to $ACTUAL"
            exit 1
          fi
          echo "PASS: $ACTUAL skills match declared count in docs/SKILLS.md"

      - name: Full-corpus fence-scan (all skills/**/*.md)
        run: |
          mapfile -t MD_FILES < <(find skills -name "*.md")
          bash tools/fence-scan.sh "${MD_FILES[@]}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dangerous pattern scan
        run: bash tools/dangerous-pattern-scan.sh

      - name: IP disclosure audit
        run: bash test/public-repo-ip-check.test.sh
