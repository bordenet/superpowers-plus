source_gap: "While resolving Caller Removal Trace's mechanized JSON evidence-verification bugs (9 confirmed across three review rounds: word-boundary collisions, exit_code-vs-count semantics, comment-only mentions, multi-declaration/re-export exclusion, symlinked-directory traversal, case-insensitive-filesystem git-checkout collisions), a harsh review flagged that Producer Trace's own mechanized evidence commands (grep-based producer-search, e.g. checking for `.emit(`/`.inc(`/`publish(` calls) use the structurally identical primitive -- a repo-scoped grep replayed by tools/verify-cr-battery-evidence.js to prove absence of a producer -- and are exposed to the same bypass classes (symlinked vendor/shared directories hiding a real producer call, case-insensitive-filesystem checkout collisions dropping a real file from the working tree). This was NOT independently confirmed against Producer Trace's actual evidence commands (only reasoned about by analogy during the Caller Removal Trace review) and Caller Removal Trace's own detection LOGIC and multi-declaration/dynamic-dispatch reasoning are pattern-specific, not directly transferable -- Producer Trace needs its own independent adversarial verification before any fix is proposed, not an ad-hoc port of Caller Removal Trace's decision (drop mechanization) under time pressure."
