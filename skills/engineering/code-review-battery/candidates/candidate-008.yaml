pattern: |
  Any evidence.command in this file that relies on `grep -r` (or similar recursive
  search) to prove GLOBAL ABSENCE of something across a repo (a producer, a caller,
  a reference) should be checked for the same three bypass classes found in Caller
  Removal Trace's history: (1) symlinked directories that grep does not traverse
  into by default, (2) case-insensitive-filesystem git-checkout collisions that can
  silently drop a real file from the working tree, (3) multi-declaration/re-export
  sites that make "the declaration" ambiguous to exclude correctly. Producer Trace
  is the most likely candidate given its structurally identical grep-replay
  evidence mechanism, but any other pattern using a similar absence-proving idiom
  should also be audited.
